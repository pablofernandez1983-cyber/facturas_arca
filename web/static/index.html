<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>AlquiBot ARCA</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AlquiBot">
<meta name="theme-color" content="#1a2744">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f0f2f5; --card: #fff; --primary: #1a56db; --success: #0e9f6e;
    --danger: #e02424; --warning: #f59e0b; --gray: #6b7280;
    --border: #e5e7eb; --text: #111827; --sub: #6b7280; --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); font-size: 15px; }

  header { background: var(--primary); color: #fff; padding: 10px 14px;
           position: sticky; top: 0; z-index: 10;
           display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  header h1 { font-size: 17px; font-weight: 700; flex: 1; }
  header select { border: none; border-radius: 8px; padding: 6px 8px; font-size: 13px;
                  background: rgba(255,255,255,.2); color: #fff; cursor: pointer; outline: none; }
  header select option { background: #1e3a8a; }
  #selAnio { width: 72px; }
  #selMesN { width: 106px; }

  .chips { margin: 14px 16px 0; display: flex; gap: 10px; }
  .chip  { flex: 1; border-radius: 10px; padding: 10px 14px; font-size: 13px;
           font-weight: 600; text-align: center; display: flex; flex-direction: column; gap: 2px; }
  .chip span { font-size: 22px; font-weight: 800; }
  .chip.p { background: #fff7ed; color: var(--warning); cursor: pointer; }
  .chip.p:active { opacity: .8; }
  .chip.e { background: #f0fdf4; color: var(--success); }
  .chip.t { background: #eff6ff; color: var(--primary); }

  .seccion { margin: 14px 16px 0; }
  .sec-tit  { font-size: 12px; font-weight: 700; letter-spacing: .06em;
              text-transform: uppercase; color: var(--sub); margin-bottom: 8px; padding-left: 2px; }

  .factura { background: var(--card); border-radius: var(--r); padding: 8px 12px;
             margin-bottom: 5px; border: 2px solid transparent;
             display: flex; align-items: center; gap: 10px;
             cursor: pointer; transition: border-color .15s, box-shadow .15s; }
  .factura.sel { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,86,219,.12); }
  .factura.emi { opacity: .55; cursor: default; }

  .chk { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0;
         border: 2px solid var(--border); background: #fff;
         display: flex; align-items: center; justify-content: center; transition: .15s; }
  .sel .chk { background: var(--primary); border-color: var(--primary); }
  .chk svg { display: none; }
  .sel .chk svg { display: block; }

  .fi { flex: 1; min-width: 0; }
  .ft { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .fr { font-weight: 700; font-size: 14px; }
  .fp { font-weight: 800; font-size: 14px; color: var(--primary); white-space: nowrap; }
  .fd { font-size: 12px; color: var(--sub); margin-top: 1px;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ff { font-size: 11px; color: var(--sub); }
  .fd-row { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
  .badge { font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 20px; }
  .badge.e { background: #d1fae5; color: #065f46; }
  .badge.p { background: #fff3cd; color: #92400e; }

  .sec-tit-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .btn-selall { font-size: 11px; font-weight: 600; color: var(--primary);
                background: none; border: none; cursor: pointer; padding: 2px 6px;
                border-radius: 6px; }
  .btn-selall:active { background: var(--border); }

  .vacio { text-align: center; padding: 40px 20px; color: var(--sub); font-size: 14px; }

  .barra { position: fixed; bottom: 0; left: 0; right: 0;
           padding: 12px 16px max(env(safe-area-inset-bottom),12px);
           background: var(--card); border-top: 1px solid var(--border);
           box-shadow: 0 -2px 12px rgba(0,0,0,.08); }
  .btn-emit { width: 100%; padding: 15px; border: none; border-radius: var(--r);
              background: var(--primary); color: #fff; font-size: 16px; font-weight: 700;
              cursor: pointer; transition: opacity .15s; }
  .btn-emit:disabled { opacity: .4; cursor: default; }
  .btn-emit:not(:disabled):active { opacity: .85; }
  .scroll { padding-bottom: 100px; }

  /* Status bar del workflow */
  .wf-bar { margin: 10px 16px 0; padding: 10px 14px; border-radius: 10px;
            font-size: 13px; font-weight: 600; display: none; align-items: center; gap: 8px; }
  .wf-bar.show { display: flex; }
  .wf-bar.running { background: #fefce8; color: #92400e; }
  .wf-bar.success { background: #f0fdf4; color: #065f46; }
  .wf-bar.failure { background: #fef2f2; color: #991b1b; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { width: 16px; height: 16px; border: 2.5px solid currentColor;
          border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }

  /* Modal */
  .overlay { display: none; position: fixed; inset: 0; z-index: 100;
             background: rgba(0,0,0,.5); align-items: flex-end; }
  .overlay.on { display: flex; }
  .modal { background: var(--card); border-radius: 20px 20px 0 0; width: 100%;
           max-height: 85vh; display: flex; flex-direction: column;
           padding: 0 0 max(env(safe-area-inset-bottom),20px); }
  .mh { padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
        display: flex; align-items: center; justify-content: space-between; }
  .mh h2 { font-size: 17px; font-weight: 700; }
  .mc { font-size: 22px; color: var(--sub); cursor: pointer; background: none; border: none; }
  .mb { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .mf { padding: 12px 20px 0; display: flex; gap: 10px; }
  .btn-cancel { flex: 1; padding: 14px; border: 2px solid var(--border); border-radius: var(--r);
                background: none; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-ok { flex: 2; padding: 14px; border: none; border-radius: var(--r);
            background: var(--primary); color: #fff; font-size: 15px; font-weight: 700;
            cursor: pointer; }
  .btn-ok:active { opacity: .85; }
  .lista-m { list-style: none; }
  .lista-m li { padding: 10px 0; border-bottom: 1px solid var(--border);
                font-size: 14px; display: flex; justify-content: space-between; }
  .lista-m li:last-child { border: none; }
  .lmr { font-weight: 600; }
  .lmd { color: var(--sub); font-size: 13px; margin-top: 2px; }
  .lmp { font-weight: 700; color: var(--primary); }
  .lmt { font-size: 11px; color: var(--sub); font-weight: 600; }
  .log { background: #0f172a; color: #e2e8f0; font-family: monospace; font-size: 12px;
         border-radius: 10px; padding: 12px; max-height: 260px; overflow-y: auto;
         white-space: pre-wrap; word-break: break-all; margin-top: 12px; }
  .ls { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .ls.r { color: var(--warning); } .ls.ok { color: var(--success); } .ls.er { color: var(--danger); }

  /* Botón editar en card */
  .btn-edit { background: none; border: none; cursor: pointer; font-size: 15px;
              padding: 2px 4px; border-radius: 6px; color: var(--sub);
              flex-shrink: 0; align-self: flex-start; margin-top: 0; }
  .btn-edit:active { background: var(--border); }

  /* Modal de edición */
  .edit-field { margin-bottom: 14px; }
  .edit-field label { display: block; font-size: 12px; font-weight: 700;
                      text-transform: uppercase; letter-spacing: .05em;
                      color: var(--sub); margin-bottom: 5px; }
  .edit-field input, .edit-field textarea {
    width: 100%; padding: 10px 12px; border: 2px solid var(--border);
    border-radius: 10px; font-size: 15px; outline: none; font-family: inherit;
    transition: border-color .15s;
  }
  .edit-field input:focus, .edit-field textarea:focus { border-color: var(--primary); }
  .edit-field textarea { resize: vertical; min-height: 70px; }
  .edit-row { display: flex; gap: 10px; }
  .edit-row .edit-field { flex: 1; }

  /* Pantalla de contraseña */
  #loginScreen {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg); display: flex; align-items: center; justify-content: center;
  }
  #loginScreen.oculto { display: none; }
  .login-card {
    background: var(--card); border-radius: 20px; padding: 36px 28px;
    width: 300px; box-shadow: 0 8px 30px rgba(0,0,0,.12); text-align: center;
  }
  .login-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .login-card p  { font-size: 14px; color: var(--sub); margin-bottom: 24px; }
  .login-card input {
    width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: var(--r);
    font-size: 22px; text-align: center; letter-spacing: 8px; outline: none;
    margin-bottom: 14px; transition: border-color .15s;
  }
  .login-card input:focus { border-color: var(--primary); }
  .login-card input.error { border-color: var(--danger); }
  .login-card button {
    width: 100%; padding: 14px; border: none; border-radius: var(--r);
    background: var(--primary); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
  }
  .login-card button:active { opacity: .85; }
  .login-error { font-size: 13px; color: var(--danger); font-weight: 600;
                 margin-top: 10px; min-height: 18px; }

  .btn-copy { background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.4);
              color: #fff; border-radius: 8px; padding: 8px 8px; font-size: 11px;
              font-weight: 600; cursor: pointer; white-space: normal;
              line-height: 1.3; text-align: center; max-width: 72px; }
  .btn-copy:active { opacity: .75; }
</style>
</head>
<body>

<div class="overlay" id="editOverlay">
  <div class="modal">
    <div class="mh">
      <h2>Editar factura</h2>
      <button class="mc" onclick="cerrarEdit()">✕</button>
    </div>
    <div class="mb">
      <div class="edit-field">
        <label>Receptor (CUIT / Doc)</label>
        <input type="text" id="eReceptor" inputmode="numeric">
      </div>
      <div class="edit-field">
        <label>Detalle</label>
        <textarea id="eDetalle"></textarea>
      </div>
      <div class="edit-row">
        <div class="edit-field">
          <label>Precio</label>
          <input type="number" id="ePrecio" step="0.01">
        </div>
        <div class="edit-field">
          <label>Fecha comprobante</label>
          <input type="date" id="eFecha">
        </div>
      </div>
      <div class="edit-row">
        <div class="edit-field">
          <label>Desde</label>
          <input type="date" id="eDesde">
        </div>
        <div class="edit-field">
          <label>Hasta</label>
          <input type="date" id="eHasta">
        </div>
      </div>
      <div class="edit-field">
        <label>Vto. pago</label>
        <input type="date" id="eVto">
      </div>
      <div id="editError" style="color:var(--danger);font-size:13px;font-weight:600;min-height:18px;margin-top:4px"></div>
    </div>
    <div class="mf">
      <button class="btn-cancel" onclick="cerrarEdit()">Cancelar</button>
      <button class="btn-ok" onclick="guardarEdicion()">Guardar</button>
    </div>
  </div>
</div>

<div id="loginScreen">
  <div class="login-card">
    <h2>📋 AlquiBot ARCA</h2>
    <p>Ingresá la contraseña para continuar</p>
    <input type="password" id="pinInput" maxlength="10" placeholder="••••"
           onkeydown="if(event.key==='Enter') verificarPin()">
    <button onclick="verificarPin()">Ingresar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<header>
  <img src="/static/logo.png" alt="ARCA"
       style="height:32px;border-radius:6px;flex-shrink:0">
  <h1>Facturador de Alquileres</h1>
  <button class="btn-copy" onclick="copiarMesAnterior()">+ Copiar mes anterior</button>
  <select id="selAnio" onchange="actualizarMeses()"></select>
  <select id="selMesN" onchange="cargar()"></select>
</header>

<div class="scroll">
  <div class="chips">
    <div class="chip p" onclick="selAllPendientes()" title="Seleccionar todas las pendientes"><span id="cp">—</span>Pendientes</div>
    <div class="chip e"><span id="ce">—</span>Emitidas</div>
    <div class="chip t"><span id="ct">—</span>Total</div>
  </div>

  <div class="wf-bar" id="wfBar">
    <div class="spin" id="wfSpin"></div>
    <span id="wfMsg">Workflow en curso...</span>
    <a id="wfLink" href="#" target="_blank" style="margin-left:auto;font-size:12px;color:inherit">ver ↗</a>
  </div>

  <div id="contenido"></div>
</div>

<div class="barra">
  <button class="btn-emit" id="btnEmit" disabled onclick="abrirModal()">
    Seleccioná facturas para emitir
  </button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mh">
      <h2 id="mtit">Confirmar emisión</h2>
      <button class="mc" onclick="cerrarModal()">✕</button>
    </div>
    <div class="mb" id="mbody"></div>
    <div class="mf" id="mfoot">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-ok" onclick="confirmar()">Emitir ahora</button>
    </div>
  </div>
</div>

<script>
// ─── Login ────────────────────────────────────────────────────────────────
async function verificarPin() {
  const input = document.getElementById("pinInput");
  const err   = document.getElementById("loginError");
  const btn   = document.querySelector("#loginScreen button");
  btn.disabled = true;

  const resp = await fetch("/api/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ pin: input.value }),
  }).then(r => r.json()).catch(() => ({ error: "Error de conexión" }));

  btn.disabled = false;

  if (resp.ok) {
    sessionStorage.setItem("auth", "ok");
    document.getElementById("loginScreen").classList.add("oculto");
    err.textContent = "";
    input.classList.remove("error");
    init();
  } else {
    input.classList.add("error");
    err.textContent = resp.error || "Contraseña incorrecta";
    input.value = "";
    input.focus();
  }
}

if (sessionStorage.getItem("auth") === "ok") {
  document.getElementById("loginScreen").classList.add("oculto");
} else {
  document.getElementById("pinInput").focus();
}

// ─── Supabase ─────────────────────────────────────────────────────────────
const SUPABASE_URL = "https://zqwkznlgbkofsrygqezk.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxd2t6bmxnYmtvZnNyeWdxZXprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MTAzMTAsImV4cCI6MjA5MTA4NjMxMH0.GNt-G_RUcxLYCpSqAKKI4KxNU87bBEQAJVCr88R2wQE";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let todas = [], sel = new Set(), polTimer = null;

// ─── Init ──────────────────────────────────────────────────────────────────
async function copiarMesAnterior() {
  const mes = getMesSeleccionado();
  const [anio, m] = mes.split("-").map(Number);
  const mesOrigen = m === 1 ? `${anio-1}-12` : `${anio}-${String(m-1).padStart(2,"0")}`;
  const mesNombre = new Date(anio, m-1, 1).toLocaleString("es-AR", {month:"long", year:"numeric"});
  const origenNombre = new Date(anio, m-2 < 0 ? 11 : m-2, 1).toLocaleString("es-AR", {month:"long", year:"numeric"});

  if (!confirm(`¿Copiar facturas de ${origenNombre} a ${mesNombre}?\n\nLas facturas pendientes de ${mesNombre} se van a reemplazar con las de ${origenNombre}.\nLas ya emitidas no se tocan.`)) return;

  const resp = await fetch("/api/copiar-mes", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ mes_origen: mesOrigen, mes_destino: mes }),
  }).then(r=>r.json()).catch(e=>({error: e.message}));

  if (resp.error) {
    alert("Error: " + resp.error);
  } else {
    alert(`✅ ${resp.copiadas} factura${resp.copiadas!==1?"s":""} copiada${resp.copiadas!==1?"s":""} a ${mesNombre}`);
    cargar();
  }
}

let _mesesDisponibles = [];  // ["2026-04", "2026-05", ...]

const NOMBRES_MES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio",
                     "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

function getMesSeleccionado() {
  const anio = document.getElementById("selAnio").value;
  const mes  = document.getElementById("selMesN").value;
  return `${anio}-${mes}`;
}

async function init() {
  const { data } = await sb.from("facturas").select("fecha_cbte").order("fecha_cbte", { ascending: true });
  _mesesDisponibles = [...new Set((data || []).map(r => (r.fecha_cbte || "").slice(0, 7)).filter(Boolean))];

  const ahora = new Date().toISOString().slice(0, 7);
  if (!_mesesDisponibles.length) _mesesDisponibles = [ahora];

  // Poblar años (orden ascendente)
  const anios = [...new Set(_mesesDisponibles.map(m => m.slice(0, 4)))];
  const selAnio = document.getElementById("selAnio");
  anios.forEach(a => {
    const o = document.createElement("option");
    o.value = a; o.text = a;
    if (ahora.startsWith(a)) o.selected = true;
    selAnio.appendChild(o);
  });

  actualizarMeses(ahora.slice(5, 7));
  verificarWorkflow();
}

function actualizarMeses(mesPreferido) {
  const anio = document.getElementById("selAnio").value;
  const selMesN = document.getElementById("selMesN");
  selMesN.innerHTML = "";

  const mesesDeAnio = _mesesDisponibles
    .filter(m => m.startsWith(anio))
    .map(m => m.slice(5, 7))
    .sort();  // ascendente

  const ahora = new Date().toISOString().slice(0, 7);
  const mesPref = mesPreferido || ahora.slice(5, 7);

  mesesDeAnio.forEach(m => {
    const o = document.createElement("option");
    o.value = m;
    o.text = NOMBRES_MES[parseInt(m) - 1];
    if (m === mesPref) o.selected = true;
    selMesN.appendChild(o);
  });

  cargar();
}

function fmtMes(ym) {
  const [y, m] = ym.split("-");
  return `${NOMBRES_MES[parseInt(m)-1]} ${y}`;
}

// ─── Cargar facturas ──────────────────────────────────────────────────────
async function cargar() {
  sel.clear();
  const mes = getMesSeleccionado();
  document.getElementById("contenido").innerHTML = '<div class="vacio">Cargando...</div>';

  const [y, m] = mes.split("-");
  const desde = `${mes}-01`;
  const hasta = new Date(parseInt(y), parseInt(m), 0).toISOString().slice(0, 10); // último día real del mes
  const { data, error } = await sb.from("facturas").select("*")
    .gte("fecha_cbte", desde).lte("fecha_cbte", hasta)
    .order("tipo").order("fecha_cbte");

  if (error) {
    document.getElementById("contenido").innerHTML = '<div class="vacio">Error al cargar.</div>';
    return;
  }
  todas = data || [];
  render();
}

function render() {
  const pend = todas.filter(f => !f.emitida).length;
  const emit = todas.filter(f =>  f.emitida).length;
  document.getElementById("cp").textContent = pend;
  document.getElementById("ce").textContent = emit;
  document.getElementById("ct").textContent = todas.length;

  if (!todas.length) {
    document.getElementById("contenido").innerHTML = '<div class="vacio">No hay facturas para este mes.</div>';
    actuBtn(); return;
  }

  const NOMBRE_TIPO = {
    MAMA: "WAINSTEIN, ANA",
    PAPA: "SUCESION DE JOSE FERNANDEZ",
  };

  const grupos = {};
  todas.forEach(f => { if (!grupos[f.tipo]) grupos[f.tipo]=[]; grupos[f.tipo].push(f); });

  let h = "";
  for (const tipo of ["MAMA","PAPA"]) {
    if (!grupos[tipo]) continue;
    const pendTipo = grupos[tipo].filter(f => !f.emitida).map(f => String(f.id));
    h += `<div class="seccion">
      <div class="sec-tit-row">
        <div class="sec-tit">${NOMBRE_TIPO[tipo] || tipo}</div>
        ${pendTipo.length ? `<button class="btn-selall" onclick="selAll('${tipo}')">Seleccionar todo</button>` : ""}
      </div>`;
    grupos[tipo].forEach(f => {
      const k = String(f.id);
      const s = sel.has(k);
      const p = parseFloat(String(f.precio).replace(",",".")) || 0;
      const pf = p.toLocaleString("es-AR",{style:"currency",currency:"ARS",minimumFractionDigits:0});
      h += `<div class="factura ${f.emitida?"emi":""} ${s?"sel":""}" id="c${k}"
                 onclick="${f.emitida?"":"toggle('"+k+"')"}">
        <div class="chk"><svg width="11" height="9" viewBox="0 0 12 10" fill="none">
          <path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2.2" stroke-linecap="round"/></svg></div>
        <div class="fi">
          <div class="ft"><span class="fr">${esc(f.doc_receptor)}</span><span class="fp">${pf}</span></div>
          <div class="fd-row">
            <span class="fd">${esc(f.detalle)}</span>
            <span class="ff">· ${esc(f.fecha_cbte||"")}</span>
            <span class="badge ${f.emitida?"e":"p"}">${f.emitida?"✓":"●"}</span>
          </div>
        </div>
        ${f.emitida?"":
          `<button class="btn-edit" onclick="event.stopPropagation();editarFactura('${k}')" title="Editar">✏️</button>`
        }</div>`;
    });
    h += `</div>`;
  }
  document.getElementById("contenido").innerHTML = h;
  actuBtn();
}

function toggle(k) {
  sel.has(k) ? sel.delete(k) : sel.add(k);
  document.getElementById("c"+k)?.classList.toggle("sel");
  actuBtn();
}

function selAllPendientes() {
  const ids = todas.filter(f => !f.emitida).map(f => String(f.id));
  const todosSeleccionados = ids.every(k => sel.has(k));
  ids.forEach(k => {
    if (todosSeleccionados) { sel.delete(k); document.getElementById("c"+k)?.classList.remove("sel"); }
    else                    { sel.add(k);    document.getElementById("c"+k)?.classList.add("sel"); }
  });
  actuBtn();
}

function selAll(tipo) {
  const ids = todas.filter(f => !f.emitida && f.tipo === tipo).map(f => String(f.id));
  const todosSeleccionados = ids.every(k => sel.has(k));
  ids.forEach(k => {
    if (todosSeleccionados) { sel.delete(k); document.getElementById("c"+k)?.classList.remove("sel"); }
    else                    { sel.add(k);    document.getElementById("c"+k)?.classList.add("sel"); }
  });
  actuBtn();
}

function actuBtn() {
  const n = sel.size, b = document.getElementById("btnEmit");
  b.disabled = !n;
  b.textContent = n ? `Emitir ${n} factura${n>1?"s":""} seleccionada${n>1?"s":""}` : "Seleccioná facturas para emitir";
}

// ─── Modal ────────────────────────────────────────────────────────────────
function abrirModal() {
  const lista = [...sel].map(k => todas.find(f => String(f.id)===k)).filter(Boolean);
  let tot = 0;
  const li = lista.map(f => {
    const p = parseFloat(String(f.precio).replace(",",".")) || 0; tot += p;
    return `<li><div><div class="lmr">${esc(f.doc_receptor)}</div>
      <div class="lmd">${esc(f.detalle.slice(0,50))}</div></div>
      <div style="text-align:right"><div class="lmp">$${p.toLocaleString("es-AR")}</div>
      <div class="lmt">${f.tipo}</div></div></li>`;
  }).join("");
  const totf = tot.toLocaleString("es-AR",{style:"currency",currency:"ARS",minimumFractionDigits:0});
  document.getElementById("mtit").textContent = `Emitir ${lista.length} factura${lista.length>1?"s":""}`;
  document.getElementById("mbody").innerHTML = `
    <p style="font-size:13px;color:var(--sub);margin-bottom:12px">
      El workflow de GitHub Actions va a correr y emitir estas facturas en ARCA.</p>
    <ul class="lista-m">${li}</ul>
    <p style="text-align:right;font-weight:700;font-size:16px;margin-top:12px;color:var(--primary)">Total: ${totf}</p>`;
  document.getElementById("mfoot").innerHTML = `
    <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
    <button class="btn-ok" onclick="confirmar()">Emitir ahora</button>`;
  document.getElementById("overlay").classList.add("on");
}

function cerrarModal() {
  document.getElementById("overlay").classList.remove("on");
}

async function confirmar() {
  const n = sel.size;
  if (!confirm(`¿Emitir ${n} factura${n>1?"s":""} en ARCA?\n\nEsta acción no se puede deshacer.`)) return;
  const ids = [...sel].map(Number);
  const tipos = new Set([...sel].map(k => todas.find(f => String(f.id)===k)?.tipo).filter(Boolean));
  const tipo = tipos.size === 1 ? [...tipos][0] : "AMBOS";
  document.getElementById("mfoot").innerHTML = "";
  document.getElementById("mbody").innerHTML += `
    <div class="ls r" id="ls">⏳ Enviando a GitHub Actions...</div>
    <div class="log" id="lg">Iniciando...</div>`;

  const resp = await fetch("/api/emitir", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ ids, tipo }),
  }).then(r=>r.json()).catch(e => ({error: e.message}));

  if (resp.error) {
    document.getElementById("ls").className = "ls er";
    document.getElementById("ls").textContent = "❌ " + resp.error;
    return;
  }

  document.getElementById("ls").textContent = "⏳ Workflow enviado — esperando inicio...";
  document.getElementById("lg").textContent = "GitHub Actions recibió la solicitud.\nEsperá ~30s para que arranque...";
  sel.clear(); actuBtn();
  iniciarPolling(true);
}

// ─── Polling del workflow ─────────────────────────────────────────────────
function iniciarPolling(desdModal = false) {
  if (polTimer) clearInterval(polTimer);
  polTimer = setInterval(() => pollWorkflow(desdModal), 5000);
}

async function pollWorkflow(desdeModal) {
  const est = await fetch("/api/workflow/estado").then(r=>r.json()).catch(()=>null);
  if (!est) return;

  // Actualizar barra superior
  const bar = document.getElementById("wfBar");
  const msg = document.getElementById("wfMsg");
  const lnk = document.getElementById("wfLink");
  const spn = document.getElementById("wfSpin");
  bar.className = "wf-bar show";

  if (est.status === "completed") {
    clearInterval(polTimer); polTimer = null;
    bar.classList.add(est.conclusion === "success" ? "success" : "failure");
    spn.style.display = "none";
    msg.textContent = est.conclusion === "success" ? "✅ Workflow completado exitosamente" : "❌ Workflow terminó con error";
    lnk.href = est.url;
    cargar();  // refrescar lista

    if (desdeModal) {
      const ls = document.getElementById("ls");
      if (ls) {
        ls.className = est.conclusion === "success" ? "ls ok" : "ls er";
        ls.textContent = est.conclusion === "success" ? "✅ Facturas emitidas correctamente" : "❌ Hubo un error — revisá GitHub Actions";
        document.getElementById("mfoot").innerHTML = `
          <button class="btn-ok" style="flex:1" onclick="cerrarModal();cargar()">Cerrar</button>`;
      }
    }
  } else {
    bar.classList.add("running");
    spn.style.display = "";
    msg.textContent = est.status === "in_progress" ? "⏳ Emitiendo facturas en ARCA..." : "⏳ Workflow en cola...";
    lnk.href = est.url || "#";
  }
}

async function verificarWorkflow() {
  // Al cargar, ver si hay un workflow reciente corriendo
  const est = await fetch("/api/workflow/estado").then(r=>r.json()).catch(()=>null);
  if (!est || est.status === "none" || est.status === "completed") return;
  iniciarPolling(false);
}

// ─── Edición de factura ───────────────────────────────────────────────────
let editId = null;

function editarFactura(k) {
  const f = todas.find(x => String(x.id) === k);
  if (!f) return;
  editId = f.id;
  document.getElementById("eReceptor").value = f.doc_receptor || "";
  document.getElementById("eDetalle").value  = f.detalle      || "";
  document.getElementById("ePrecio").value   = f.precio       || "";
  document.getElementById("eFecha").value    = f.fecha_cbte   || "";
  document.getElementById("eDesde").value    = f.desde        || "";
  document.getElementById("eHasta").value    = f.hasta        || "";
  document.getElementById("eVto").value      = f.vto_pago     || "";
  document.getElementById("editError").textContent = "";
  document.getElementById("editOverlay").classList.add("on");
}

function cerrarEdit() {
  document.getElementById("editOverlay").classList.remove("on");
  editId = null;
}

async function guardarEdicion() {
  if (!editId) return;
  const btn = document.querySelector("#editOverlay .btn-ok");
  btn.disabled = true; btn.textContent = "Guardando...";

  const body = {
    doc_receptor: document.getElementById("eReceptor").value.trim(),
    detalle:      document.getElementById("eDetalle").value.trim(),
    precio:       parseFloat(document.getElementById("ePrecio").value) || null,
    fecha_cbte:   document.getElementById("eFecha").value  || null,
    desde:        document.getElementById("eDesde").value  || null,
    hasta:        document.getElementById("eHasta").value  || null,
    vto_pago:     document.getElementById("eVto").value    || null,
  };

  const resp = await fetch(`/api/factura/${editId}`, {
    method: "PATCH",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body),
  }).then(r => r.json()).catch(e => ({error: e.message}));

  btn.disabled = false; btn.textContent = "Guardar";

  if (resp.error) {
    document.getElementById("editError").textContent = "Error: " + resp.error;
    return;
  }

  cerrarEdit();
  await cargar();
}

// ─── Utils ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

if (sessionStorage.getItem("auth") === "ok") init();
</script>
